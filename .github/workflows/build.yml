name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: flutter analyze lib --no-fatal-infos

      - run: flutter test test/

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"

      - name: Build signed APK
        run: |
          flutter build apk --debug \
            --dart-define=KEYSTORE_PATH=debug.keystore \
            --dart-define=KEYSTORE_PASSWORD=android \
            --dart-define=KEY_ALIAS=androiddebugkey \
            --dart-define=KEY_PASSWORD=android

      - uses: actions/upload-artifact@v4
        with:
          name: picshell-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
